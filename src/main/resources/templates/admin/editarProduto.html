<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Editar Produto</title>
</head>
<body>

    <div class="container-form">

        <div class="card-form">

            <h1>Editar Produto</h1>

            <form
                class="form-produto"
                action="/admin/produto/atualizar"
                method="post">

                <input
                    type="hidden"
                    name="id"
                    th:value="${produto.id}">

                <div class="campo">

                    <label>Título</label>

                    <input
                        type="text"
                        name="titulo"
                        th:value="${produto.titulo}">

                </div>

                <div class="campo">

                    <label>Descrição</label>

                    <textarea
                        name="descricao"
                        th:text="${produto.descricao}">
                    </textarea>

                </div>

                <div class="campo">

                    <label>Preço</label>

                    <input
                        type="number"
                        step="0.01"
                        name="preco"
                        th:value="${produto.preco}">

                </div>

                <div class="campo">

                    <label>Imagem</label>

                    <input
                        type="text"
                        name="img"
                        th:value="${produto.img}">

                </div>

                <button
                    class="btn-atualizar"
                    type="submit">

                    Atualizar

                </button>

            </form>

        </div>

    </div>

</body>
</html>
