<!DOCTYPE html>
<html>
<head>
    <title>Cadastrar Produto</title>
</head>
<body>

    <div class="container-form">

        <div class="card-form">

            <h1>
                Novo Produto
            </h1>

            <form
                class="form-produto"
                action="/admin/produto/salvar"
                method="post">

                <div class="campo">

                    <label>Título</label>

                    <input
                        type="text"
                        name="titulo">

                </div>

                <div class="campo">

                    <label>Descrição</label>

                    <textarea
                        name="descricao">
                    </textarea>

                </div>

                <div class="campo">

                    <label>Preço</label>

                    <input
                        type="number"
                        step="0.01"
                        name="preco">

                </div>

                <div class="campo">

                    <label>Imagem</label>

                    <input
                        type="text"
                        name="img">

                </div>

                <button
                    class="btn-salvar"
                    type="submit">

                    Salvar

                </button>

            </form>

        </div>

    </div>

</body>
</html>
