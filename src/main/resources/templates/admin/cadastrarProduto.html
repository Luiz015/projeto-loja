<!DOCTYPE html>
<html>
<head>
    <title>Cadastrar Produto</title>
</head>
<body>

    <h1>Novo Produto</h1>

    <form action="/admin/produto/salvar" method="post">

        <input
            type="text"
            name="titulo"
            placeholder="Título">

        <br><br>

        <textarea
            name="descricao"
            placeholder="Descrição">
        </textarea>

        <br><br>

        <input
            type="number"
            step="0.01"
            name="preco"
            placeholder="Preço">

        <br><br>

        <input
            type="text"
            name="img"
            placeholder="Imagem">

        <br><br>

        <button type="submit">
            Salvar
        </button>

    </form>

</body>
</html>
