<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

    <div class="container-login">

        <div class="card-login">

            <h1>Login</h1>

            <form
                class="form-login"
                th:action="@{/login}"
                method="post">

                <div class="campo">

                    <label>Email</label>

                    <input
                        type="email"
                        name="email" required>

                </div>

                <div class="campo">

                    <label>Senha</label>

                    <input
                        type="password"
                        name="senha" required>

                </div>

                <div class="mensagem-erro">

                    <p
                        th:if="${msgErro}"
                        th:text="${msgErro}">
                    </p>

                </div>

                <button
                    class="btn-login"
                    type="submit">

                    Entrar

                </button>

            </form>

        </div>

    </div>

</body>
</html>
