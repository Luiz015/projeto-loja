<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
</head>
<body>

    <h1>Login</h1>

    <form th:action="@{/login}" method="post">

    <label>Email</label>
    <input type="email" name="email">

    <br><br>

    <label>Senha</label>
    <input type="password" name="senha">

    <br><br>

    <p th:if="${msgErro}" th:text="${msgErro}"></p>

    <button type="submit">
        Entrar
    </button>

</form>

</body>
</html>
