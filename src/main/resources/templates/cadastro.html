<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Cadastro</title>
</head>
<body>

    <div class="container-cadastro">

        <div class="card-cadastro">

            <h1>Cadastro</h1>

            <form
                class="form-cadastro"
                th:action="@{/cadastro}"
                method="post">

                <div class="campo">
                    <label>Nome</label>
                    <input type="text" name="nome">
                </div>

                <div class="campo">
                    <label>Email</label>
                    <input type="email" name="email">
                </div>

                <div class="campo">
                    <label>Telefone</label>
                    <input type="text" name="telefone">
                </div>

                <div class="campo">
                    <label>Senha</label>
                    <input type="password" name="senha">
                </div>

                <div class="mensagem-erro">

                    <p
                        th:if="${msgErro}"
                        th:text="${msgErro}">
                    </p>

                </div>

                <button
                    class="btn-cadastro"
                    type="submit">

                    Cadastrar

                </button>

            </form>

            <a
                class="link-login"
                href="/login">

                Já possui conta?

            </a>

        </div>

    </div>

</body>
</html>
